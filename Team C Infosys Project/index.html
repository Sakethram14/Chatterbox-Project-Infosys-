<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Chatterbox Elite</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── Theme variables ──────────────────────────────────────────────────── */
:root {
  --bg:       #0d1117;
  --surf:     #161b22;
  --surf2:    #21262d;
  --surf3:    #30363d;
  --accent:   #58a6ff;
  --accent2:  #1f6feb;
  --out:      #1c3a5e;
  --in:       #21262d;
  --text:     #e6edf3;
  --sub:      #8b949e;
  --border:   #30363d;
  --danger:   #f85149;
  --green:    #3fb950;
  --yellow:   #d29922;
  --sb-w:     270px;
  --users-w:  220px;
  --hdr-h:    60px;
  --radius:   12px;
}
[data-theme="light"] {
  --bg:    #f0f2f5;
  --surf:  #ffffff;
  --surf2: #f6f8fa;
  --surf3: #eaeef2;
  --out:   #0d47a1;
  --in:    #ffffff;
  --text:  #1c1e21;
  --sub:   #65676b;
  --border:#d8dee4;
}

/* ── Reset ────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}

/* ── Login ────────────────────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0d1117 0%,#1a237e 50%,#0d1117 100%);
  background-size:400% 400%;animation:gradAnim 8s ease infinite}
@keyframes gradAnim{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.card{background:rgba(22,27,34,.92);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.card h2{text-align:center;font-size:24px;margin-bottom:8px;color:var(--text)}
.card h2 .logo{color:var(--accent)}
.card .tagline{text-align:center;color:var(--sub);font-size:13px;margin-bottom:28px}
.card input,.card select{width:100%;padding:12px 14px;margin:8px 0;border-radius:10px;
  border:1px solid var(--border);background:var(--surf2);color:var(--text);outline:none;font-size:14px;
  transition:border-color .2s}
.card input:focus,.card select:focus{border-color:var(--accent)}
.card .divider{display:flex;align-items:center;gap:10px;color:var(--sub);font-size:12px;margin:12px 0}
.card .divider::before,.card .divider::after{content:'';flex:1;height:1px;background:var(--border)}
#login-err{color:var(--danger);font-size:13px;text-align:center;margin:8px 0;min-height:20px}
.btn-join{width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;
  background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;margin-top:12px;
  transition:transform .2s,box-shadow .2s}
.btn-join:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(88,166,255,.35)}
.btn-join:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── App shell ────────────────────────────────────────────────────────── */
#app{display:none;width:100%;height:100vh;overflow:hidden}
#app.visible{display:flex}

/* ── Left sidebar ─────────────────────────────────────────────────────── */
#left-sb{width:var(--sb-w);min-width:var(--sb-w);height:100vh;background:var(--surf);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:16px 14px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.my-profile{display:flex;align-items:center;gap:10px}
.my-info .my-name{font-weight:600;font-size:14px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block;margin-right:4px;transition:background .4s}
.conn-dot.online{background:var(--green)}
.conn-label{font-size:11px;color:var(--sub)}
.sb-icon-btns{display:flex;gap:6px}
.sb-icon-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-size:15px;padding:6px;border-radius:8px;transition:background .15s,color .15s}
.sb-icon-btn:hover{background:var(--surf3);color:var(--text)}
.sb-section{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.06em;padding:14px 14px 6px;text-transform:uppercase}
.room-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-radius:8px;margin:2px 8px;
  color:var(--sub);font-size:14px;transition:background .15s,color .15s;position:relative}
.room-item:hover{background:var(--surf2);color:var(--text)}
.room-item.active{background:var(--surf2);color:var(--accent);font-weight:600}
.room-icon{width:32px;height:32px;border-radius:50%;background:var(--surf3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.unread-badge{background:var(--accent);color:#fff;border-radius:12px;font-size:10px;font-weight:700;
  padding:2px 7px;position:absolute;right:10px}
#left-sb-scroll{overflow-y:auto;flex:1}

/* ── Main area ────────────────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--bg)}

#chat-header{height:var(--hdr-h);min-height:var(--hdr-h);background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.hdr-left{display:flex;align-items:center;gap:12px}
#hdr-room-name{font-weight:700;font-size:16px}
#typing-indicator{font-size:12px;color:var(--accent);min-height:16px}
.hdr-right{display:flex;gap:6px}
.hdr-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-size:16px;padding:8px;border-radius:8px;transition:background .15s,color .15s}
.hdr-btn:hover{background:var(--surf2);color:var(--text)}

/* Pin banner */
#pin-banner{display:none;background:var(--surf2);border-bottom:1px solid var(--border);
  padding:8px 18px;align-items:center;gap:10px;font-size:13px}
#pin-text{flex:1;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.pin-close{color:var(--sub);cursor:pointer;font-size:13px}

/* Search bar */
#search-bar{display:none;background:var(--surf2);border-bottom:1px solid var(--border);padding:8px 18px;align-items:center;gap:10px}
#search-bar.active{display:flex}
#search-input{flex:1;background:var(--surf3);border:1px solid var(--border);color:var(--text);border-radius:8px;
  padding:8px 12px;font-size:14px;outline:none}
#search-count{font-size:12px;color:var(--sub);white-space:nowrap}

/* Chat box */
#chat-box{flex:1;overflow-y:auto;padding:16px 8%;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
#chat-box::-webkit-scrollbar{width:5px}
#chat-box::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}

/* Date separator */
.date-sep{text-align:center;margin:16px 0 8px;display:flex;align-items:center;gap:10px}
.date-sep span{background:var(--surf2);color:var(--sub);font-size:11px;padding:3px 12px;border-radius:20px;white-space:nowrap}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* Message rows */
.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:2px;position:relative}
.msg-row.mine{flex-direction:row-reverse}
.msg-row.grouped .msg-avatar{visibility:hidden}
.msg-row.grouped .sender-name{display:none}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-end}
.msg-col{display:flex;flex-direction:column;max-width:62%;gap:2px}
.mine .msg-col{align-items:flex-end}
.sender-name{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px;padding-left:2px}

/* Reply quote */
.reply-quote{background:var(--surf3);border-left:3px solid var(--accent);border-radius:6px;
  padding:5px 10px;margin-bottom:4px;font-size:12px;cursor:pointer}
.reply-quote .rq-user{font-weight:700;color:var(--accent);margin-bottom:2px}
.reply-quote .rq-text{color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Bubbles */
.bubble{padding:9px 13px;border-radius:var(--radius);word-wrap:break-word;font-size:14.5px;
  position:relative;line-height:1.45;border:1px solid transparent}
.mine .bubble{background:var(--out);border-color:rgba(88,166,255,.15);border-top-right-radius:3px}
.theirs .bubble{background:var(--in);border-color:var(--border);border-top-left-radius:3px}
.bubble-content img{max-width:100%;max-height:280px;border-radius:8px;cursor:pointer}
.voice-player{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:180px}
.voice-icon{font-size:28px;color:var(--accent);flex-shrink:0}
.voice-info{font-size:13px}
.voice-info small{color:var(--sub);font-size:11px}

/* Bubble meta */
.bubble-meta{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:4px}
.msg-time{font-size:10px;color:var(--sub)}
.tick{font-size:11px;color:var(--sub)}
.tick.read{color:#4db6ac}
.edited-label{font-size:10px;color:var(--sub);font-style:italic}

/* 3-dot menu */
.dots-btn{position:absolute;top:4px;right:4px;background:none;border:none;color:var(--sub);
  cursor:pointer;font-size:13px;padding:3px 5px;border-radius:5px;opacity:0;transition:opacity .15s}
.bubble:hover .dots-btn{opacity:1}
.ctx-menu{display:none;position:absolute;z-index:200;background:var(--surf2);border:1px solid var(--border);
  border-radius:10px;min-width:160px;right:0;top:28px;box-shadow:0 8px 24px rgba(0,0,0,.4);padding:5px 0}
.ctx-menu.active{display:block}
.ctx-item{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:8px;transition:background .12s}
.ctx-item:hover{background:var(--surf3)}
.ctx-item.danger{color:var(--danger)}
.ctx-item i{width:14px;text-align:center;color:var(--sub)}
.ctx-item.danger i{color:var(--danger)}

/* Reactions */
.reactions-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.mine .reactions-row{justify-content:flex-end}
.react-pill{background:var(--surf2);border:1px solid var(--border);border-radius:20px;
  padding:3px 8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .12s}
.react-pill:hover{background:var(--surf3)}
.react-pill.mine-react{border-color:var(--accent);background:rgba(88,166,255,.1)}
.react-picker{position:absolute;bottom:100%;right:0;background:var(--surf2);border:1px solid var(--border);
  border-radius:12px;padding:8px;display:flex;gap:6px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:150}
.react-picker span{font-size:20px;cursor:pointer;padding:3px;border-radius:6px;transition:transform .1s}
.react-picker span:hover{transform:scale(1.3);background:var(--surf3)}

/* System messages */
.sys-msg{text-align:center;margin:10px 0}
.sys-msg span{background:var(--surf2);color:var(--sub);font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--border)}

/* Scroll-to-bottom */
#scroll-btn{position:absolute;bottom:80px;right:24px;width:42px;height:42px;border-radius:50%;
  background:var(--surf2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:50;
  transition:transform .15s}
#scroll-btn:hover{transform:scale(1.08)}
#scroll-btn.visible{display:flex}
#scroll-unread{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;
  border-radius:12px;font-size:9px;font-weight:700;padding:2px 5px;min-width:16px;text-align:center;display:none}

/* Reply preview bar */
#reply-preview{display:none;background:var(--surf2);border-top:1px solid var(--border);
  padding:8px 18px;align-items:center;gap:10px}
#reply-preview.active{display:flex}
#rp-user{font-weight:700;color:var(--accent);font-size:12px}
#rp-text{font-size:12px;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Emoji drawer */
#emoji-drawer{display:none;background:var(--surf2);padding:12px;
  grid-template-columns:repeat(8,1fr);gap:10px;border-top:1px solid var(--border);max-height:160px;overflow-y:auto}
#emoji-drawer.open{display:grid}
.ej{cursor:pointer;font-size:22px;text-align:center;border-radius:6px;padding:3px;transition:transform .1s}
.ej:hover{transform:scale(1.2);background:var(--surf3)}

/* Toolbar */
#toolbar{background:var(--surf);padding:10px 14px;display:flex;gap:10px;align-items:center;border-top:1px solid var(--border)}
.pill{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:24px;
  display:flex;align-items:center;padding:4px 14px;gap:12px}
.pill input{flex:1;background:transparent;border:none;color:var(--text);outline:none;
  padding:9px 0;font-size:15px}
.pill input::placeholder{color:var(--sub)}
.icon-btn{color:var(--sub);font-size:18px;cursor:pointer;transition:color .15s;flex-shrink:0}
.icon-btn:hover{color:var(--accent)}
.action-btn{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(31,111,235,.4);transition:transform .15s}
.action-btn:hover{transform:scale(1.06)}

/* Recording UI */
#rec-ui{display:none;flex:1;align-items:center;justify-content:space-between;padding:0 18px;
  color:var(--danger);background:var(--surf2);border-radius:24px;border:1px solid var(--border)}
.blink{animation:bl 1.2s linear infinite}
@keyframes bl{50%{opacity:0}}

/* Right sidebar */
#right-sb{width:var(--users-w);min-width:var(--users-w);height:100vh;background:var(--surf);
  border-left:1px solid var(--border);flex-direction:column;overflow:hidden;display:none}
#right-sb.open{display:flex}
.rsb-hdr{padding:16px 14px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:space-between}
.user-entry{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;
  border-radius:8px;margin:2px 8px;transition:background .15s}
.user-entry:hover{background:var(--surf2)}
.user-entry .uname{font-size:13px;font-weight:600}
.user-entry .u-online{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.user-entry .u-online::before{content:'●';font-size:8px}

/* Avatars */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}

/* Modals */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400}
.modal-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:401;
  background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:24px;min-width:320px;max-width:90vw}
.modal-box h3{margin-bottom:16px;font-size:16px}
.modal-box img{max-width:100%;max-height:60vh;border-radius:10px;display:block;margin:0 auto 16px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-sec{padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surf2);
  color:var(--text);cursor:pointer;font-size:13px;transition:background .15s}
.btn-sec:hover{background:var(--surf3)}
.btn-prim{padding:9px 18px;border-radius:8px;border:none;background:var(--accent2);
  color:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s}
.btn-prim:hover{background:var(--accent)}
.fwd-room-btn{width:100%;text-align:left;padding:12px 16px;border:1px solid var(--border);
  border-radius:8px;background:var(--surf2);color:var(--text);cursor:pointer;margin-bottom:8px;
  font-size:14px;transition:background .15s}
.fwd-room-btn:hover{background:var(--surf3)}

/* Toast */
#toast-wrap{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:10px;
  font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast.err{border-color:var(--danger);color:var(--danger)}

/* Search highlight */
.search-dim{opacity:.3}
.search-hi .bubble{outline:2px solid var(--accent)}

/* Scrollbar */
#left-sb-scroll::-webkit-scrollbar,#right-sb::-webkit-scrollbar{width:4px}
#left-sb-scroll::-webkit-scrollbar-thumb,#right-sb::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:3px}
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="card">
    <h2><span class="logo">⚡</span> Chatterbox</h2>
    <p class="tagline">Real-time chat for teams & friends</p>
    <input type="text" id="L-user" placeholder="Username (required)" autocomplete="username">
    <input type="password" id="L-pass" placeholder="Password (optional — sets on first use)">
    <div class="divider">Room</div>
    <select id="L-room">
      <option value="General">General</option>
      <option value="Tech">Tech</option>
      <option value="Fun">Fun</option>
    </select>
    <input type="text" id="L-custom" placeholder="Or type a custom room name…">
    <div id="login-err"></div>
    <button class="btn-join" id="join-btn" onclick="doJoin()">Enter Chat</button>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Left sidebar -->
  <div id="left-sb">
    <div class="sb-top">
      <div class="my-profile">
        <div class="av" id="my-av" style="width:34px;height:34px;font-size:14px"></div>
        <div class="my-info">
          <div class="my-name" id="my-uname"></div>
          <div class="conn-label"><span class="conn-dot" id="conn-dot"></span><span id="conn-label">Connecting…</span></div>
        </div>
      </div>
      <div class="sb-icon-btns">
        <button class="sb-icon-btn" title="Toggle theme" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
        <button class="sb-icon-btn" title="Notification permission" onclick="reqNotif()"><i class="fa-solid fa-bell"></i></button>
      </div>
    </div>
    <div id="left-sb-scroll">
      <div class="sb-section">Rooms</div>
      <div id="room-list"></div>
      <div class="sb-section">Direct Messages</div>
      <div id="dm-list"></div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="chat-header">
      <div class="hdr-left">
        <div class="av" id="hdr-av" style="width:36px;height:36px;font-size:15px"></div>
        <div>
          <div id="hdr-room-name"></div>
          <div id="typing-indicator"></div>
        </div>
      </div>
      <div class="hdr-right">
        <button class="hdr-btn" title="Search" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="hdr-btn" title="Online users" onclick="toggleRightSb()"><i class="fa-solid fa-users"></i></button>
      </div>
    </div>

    <!-- Pin banner -->
    <div id="pin-banner">
      <i class="fa-solid fa-thumbtack" style="color:var(--accent)"></i>
      <span id="pin-text"></span>
      <i class="fa-solid fa-xmark pin-close" onclick="sendUnpin()"></i>
    </div>

    <!-- Search bar -->
    <div id="search-bar">
      <i class="fa-solid fa-magnifying-glass" style="color:var(--sub)"></i>
      <input id="search-input" placeholder="Search messages…" oninput="runSearch()" onkeydown="searchNav(event)">
      <span id="search-count"></span>
      <button class="sb-icon-btn" onclick="closeSearch()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Chat box -->
    <div id="chat-box"></div>

    <!-- Scroll button -->
    <button id="scroll-btn" onclick="scrollToBottom()">
      <i class="fa-solid fa-chevron-down"></i>
      <span id="scroll-unread"></span>
    </button>

    <!-- Reply preview -->
    <div id="reply-preview">
      <i class="fa-solid fa-reply" style="color:var(--accent)"></i>
      <div style="flex:1">
        <div id="rp-user"></div>
        <div id="rp-text"></div>
      </div>
      <button class="sb-icon-btn" onclick="cancelReply()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Emoji drawer -->
    <div id="emoji-drawer">
      <span class="ej" onclick="addEj('😀')">😀</span><span class="ej" onclick="addEj('😂')">😂</span>
      <span class="ej" onclick="addEj('😍')">😍</span><span class="ej" onclick="addEj('🥰')">🥰</span>
      <span class="ej" onclick="addEj('😎')">😎</span><span class="ej" onclick="addEj('🤔')">🤔</span>
      <span class="ej" onclick="addEj('😴')">😴</span><span class="ej" onclick="addEj('😭')">😭</span>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let user = '', room = '';
let socket = null;
let reconnectAttempts = 0, maxReconnect = 8, reconnectTimer = null;
let recorder = null, chunks = [], typingTimer = null;
let activeAudio = null;
let isConnected = false, isWindowFocused = true;
let pendingImgData = null;   // base64 for image preview
let replyTo = null;          // { msgId, username, content }
let editingMsgId = null;
let unreadCount = 0;
let roomUnread = {};         // room → unread count (for left sidebar)

// Render tracking
let lastSender = null, lastMsgTs = 0, lastDateStr = null;

// Search
let searchActive = false, searchMatches = [], searchIdx = 0;

// Forward target
let fwdContent = '';

// Known rooms + DMs
const PRESET_ROOMS = ['General', 'Tech', 'Fun'];
let dmRooms = [];

const REACT_EMOJIS = ['👍','❤️','😂','😮','😢','😡','🎉','🔥'];

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function avColor(name) {
  const pal = ['#e91e63','#9c27b0','#3f51b5','#1976d2','#0097a7','#388e3c','#f57c00','#5d4037','#455a64'];
  let h = 0;
  for (const c of name) h = (h << 5) - h + c.charCodeAt(0);
  return pal[Math.abs(h) % pal.length];
}
function avInitial(name) { return (name||'?').charAt(0).toUpperCase(); }
function makeAv(name, size, fontSize) {
  const el = document.createElement('div');
  el.className = 'av';
  el.style.cssText = `width:${size}px;height:${size}px;font-size:${fontSize}px;background:${avColor(name)}`;
  el.textContent = avInitial(name);
  return el;
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  const today    = new Date(); today.setHours(0,0,0,0);
  const yesterday= new Date(today); yesterday.setDate(yesterday.getDate()-1);
  const msgDay   = new Date(d); msgDay.setHours(0,0,0,0);
  if (msgDay.getTime() === today.getTime())     return 'Today';
  if (msgDay.getTime() === yesterday.getTime()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday:'long', month:'short', day:'numeric' });
}
function dateKey(ts) {
  const d = new Date((ts||Date.now()/1000)*1000);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

// ── Notification sound via Web Audio API
function playNotifSound() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(); osc.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}

// ── Desktop notifications
function reqNotif() {
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(() => toast('Notification permission updated'));
  } else {
    toast('Permission: ' + Notification.permission);
  }
}
function showDesktopNotif(username, message) {
  if (!isWindowFocused && Notification.permission === 'granted') {
    new Notification(`${username} in #${room}`, { body: message.slice(0,80) });
  }
}

// ── Tab title unread badge
function updateTitle() {
  document.title = unreadCount > 0 ? `(${unreadCount}) Chatterbox` : 'Chatterbox Elite';
}

// ── Toast
function toast(msg, isErr=false) {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = 'toast' + (isErr ? ' err' : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ═══════════════════════════════════════════════════════════════════════════
// AUTH + JOIN
// ═══════════════════════════════════════════════════════════════════════════
async function doJoin() {
  const username = document.getElementById('L-user').value.trim();
  const password = document.getElementById('L-pass').value;
  const custom   = document.getElementById('L-custom').value.trim();
  const selRoom  = document.getElementById('L-room').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.getElementById('join-btn');

  errEl.textContent = '';
  if (!username) { errEl.textContent = 'Username is required.'; return; }

  btn.disabled = true; btn.textContent = 'Connecting…';

  try {
    const res  = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!data.ok) {
      errEl.textContent = data.error || 'Authentication failed.';
      btn.disabled = false; btn.textContent = 'Enter Chat';
      return;
    }
  } catch (e) {
    errEl.textContent = 'Server not reachable. Is main.py running?';
    btn.disabled = false; btn.textContent = 'Enter Chat';
    return;
  }

  user = username;
  room = custom || selRoom;

  // Setup avatar + name in sidebar
  const myAv = document.getElementById('my-av');
  myAv.style.background = avColor(user);
  myAv.textContent = avInitial(user);
  document.getElementById('my-uname').textContent = user;

  // Show app
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  buildRoomList();
  connectWS();
  reqNotif();

  // Enter key listener
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAction(); }
  });

  // Window focus tracking
  window.addEventListener('focus', () => {
    isWindowFocused = true;
    unreadCount = 0; updateTitle();
    if (socket && socket.readyState === WebSocket.OPEN && room) {
      // Send read receipts for all visible messages
      document.querySelectorAll('.msg-row:not(.mine) .bubble').forEach(b => {
        const mid = b.closest('.msg-row')?.dataset?.msgid;
        if (mid) socket.send(JSON.stringify({ type: 'read_receipt', msgId: mid }));
      });
    }
  });
  window.addEventListener('blur', () => { isWindowFocused = false; });
}

// ═══════════════════════════════════════════════════════════════════════════
// ROOM LIST UI
// ═══════════════════════════════════════════════════════════════════════════
function buildRoomList() {
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  PRESET_ROOMS.forEach(r => {
    const item = document.createElement('div');
    item.className = 'room-item' + (r === room ? ' active' : '');
    item.id = `room-item-${r}`;
    item.innerHTML = `
      <div class="room-icon">#</div>
      <span style="flex:1">${r}</span>
      <span class="unread-badge" id="unread-${r}" style="display:none"></span>`;
    item.onclick = () => switchRoom(r);
    list.appendChild(item);
  });
}

function buildDmList() {
  const list = document.getElementById('dm-list');
  list.innerHTML = '';
  dmRooms.forEach(r => {
    const other = r.replace('dm_','').replace('_'+user,'').replace(user+'_','');
    const item  = document.createElement('div');
    item.className = 'room-item' + (r === room ? ' active' : '');
    item.id = `room-item-${r}`;
    item.innerHTML = `
      <div class="av" style="width:32px;height:32px;font-size:13px;background:${avColor(other)}">${avInitial(other)}</div>
      <span style="flex:1">${other}</span>`;
    item.onclick = () => switchRoom(r);
    list.appendChild(item);
  });
}

function setActiveRoom(r) {
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`room-item-${r}`);
  if (el) el.classList.add('active');
  // Clear unread badge
  const badge = document.getElementById(`unread-${r}`);
  if (badge) { badge.style.display = 'none'; badge.textContent = ''; }
  roomUnread[r] = 0;
}

function incRoomUnread(r) {
  if (r === room) return;
  roomUnread[r] = (roomUnread[r]||0) + 1;
  let badge = document.getElementById(`unread-${r}`);
  if (!badge) return;
  badge.textContent = roomUnread[r];
  badge.style.display = '';
}

// ═══════════════════════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════════════════════
function connectWS() {
  if (socket && socket.readyState === WebSocket.OPEN) socket.close();
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

  socket = new WebSocket(`ws://${window.location.host}/ws/${encodeURIComponent(user)}/${encodeURIComponent(room)}`);

  socket.onopen = () => {
    isConnected = true; reconnectAttempts = 0;
    setConnStatus(true);
  };

  socket.onclose = (e) => {
    isConnected = false; setConnStatus(false);
    if (reconnectAttempts < maxReconnect) {
      const delay = Math.min(1000 * 2 ** reconnectAttempts, 30000);
      reconnectAttempts++;
      toast(`Disconnected. Reconnecting in ${Math.round(delay/1000)}s… (${reconnectAttempts}/${maxReconnect})`);
      reconnectTimer = setTimeout(connectWS, delay);
    } else {
      toast('Connection lost. Please refresh the page.', true);
    }
  };

  socket.onerror = () => { isConnected = false; setConnStatus(false); };

  socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleWsMsg(data);
  };

  // Update header
  document.getElementById('hdr-room-name').textContent = '#' + room;
  const hdrAv = document.getElementById('hdr-av');
  hdrAv.style.background = avColor(room);
  hdrAv.textContent = room.charAt(0).toUpperCase();
  setActiveRoom(room);
}

function setConnStatus(online) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className   = 'conn-dot' + (online ? ' online' : '');
  label.textContent = online ? 'Online' : 'Offline';
}

function handleWsMsg(data) {
  switch(data.type) {
    case 'history':
      clearChat();
      data.messages.forEach(m => render(m, true));
      scrollToBottom(true);
      break;
    case 'system':
      renderSystem(data.message);
      break;
    case 'chat':
    case 'image':
    case 'voice':
      render(data);
      // Incoming message handling
      if (data.username !== user) {
        handleIncoming(data);
      } else {
        // My own broadcast = delivered; upgrade ticks
        const tickEl = document.querySelector(`#tick-${data.msgId}`);
        if (tickEl) { tickEl.innerHTML = '✓✓'; tickEl.className = 'tick'; }
      }
      break;
    case 'delete_msg':
      document.getElementById(`row-${data.msgId}`)?.remove();
      break;
    case 'edit_msg': {
      const contentEl = document.querySelector(`#content-${data.msgId}`);
      if (contentEl) {
        contentEl.textContent = data.message;
        const metaEl = contentEl.parentNode.querySelector('.edited-label');
        if (!metaEl) {
          const edited = document.createElement('span');
          edited.className = 'edited-label'; edited.textContent = ' (edited)';
          contentEl.after(edited);
        }
      }
      break;
    }
    case 'reaction_update': {
      const rRow = document.querySelector(`#react-${data.msgId}`);
      if (rRow) renderReactPills(rRow, data.msgId, data.reactions);
      break;
    }
    case 'pinned_update':
      updatePinBanner(data.pinned);
      break;
    case 'users_update':
      renderUsersList(data.users);
      break;
    case 'read_receipt':
      if (data.username !== user) {
        const tickEl = document.querySelector(`#tick-${data.msgId}`);
        if (tickEl) { tickEl.innerHTML = '✓✓'; tickEl.className = 'tick read'; }
      }
      break;
    case 'typing':
      if (data.username !== user) document.getElementById('typing-indicator').textContent = `${data.username} is typing…`;
      break;
    case 'stop_typing':
      if (data.username !== user) document.getElementById('typing-indicator').textContent = '';
      break;
    case 'error':
      toast(data.message, true);
      break;
  }
}

function handleIncoming(data) {
  playNotifSound();
  if (!isWindowFocused) {
    unreadCount++; updateTitle();
    if (data.type === 'chat') showDesktopNotif(data.username, data.message);
  }
  // Send read receipt if window is focused
  if (isWindowFocused && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: 'read_receipt', msgId: data.msgId }));
  }
  // Update scroll button
  const box = document.getElementById('chat-box');
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 120;
  if (!atBottom) {
    const scrollBtn = document.getElementById('scroll-btn');
    scrollBtn.classList.add('visible');
    const badge = document.getElementById('scroll-unread');
    badge.style.display = ''; badge.textContent = (parseInt(badge.textContent)||0)+1;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════
function clearChat() {
  document.getElementById('chat-box').innerHTML = '';
  lastSender = null; lastMsgTs = 0; lastDateStr = null;
}

function renderSystem(msg) {
  lastSender = null; // break grouping
  const box = document.getElementById('chat-box');
  const el  = document.createElement('div');
  el.className = 'sys-msg';
  el.innerHTML = `<span>${msg}</span>`;
  box.appendChild(el);
  autoScroll();
}

function render(data, isHistory=false) {
  if (data.type === 'system') { renderSystem(data.message); return; }
  const box   = document.getElementById('chat-box');
  const isMe  = data.username === user;
  const ts    = data.timestamp || (Date.now()/1000);
  const mid   = data.msgId || `m-${Math.random().toString(36).substr(2,8)}`;

  // Date separator
  const dk = dateKey(ts);
  if (dk !== lastDateStr) {
    lastDateStr = dk;
    lastSender  = null;
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.innerHTML = `<span>${fmtDate(ts)}</span>`;
    box.appendChild(sep);
  }

  // Grouping: same sender within 5 min
  const grouped = (data.username === lastSender) && (ts - lastMsgTs < 300);
  lastSender = data.username; lastMsgTs = ts;

  // Row
  const row = document.createElement('div');
  row.className = `msg-row ${isMe ? 'mine' : 'theirs'}${grouped ? ' grouped' : ''}`;
  row.id = `row-${mid}`;
  row.dataset.msgid = mid;
  row.dataset.sender = data.username;

  // Avatar (theirs only)
  if (!isMe) {
    const avEl = makeAv(data.username, 30, 12);
    avEl.className += ' msg-avatar';
    avEl.title = data.username;
    row.appendChild(avEl);
  }

  // Message column
  const col = document.createElement('div');
  col.className = 'msg-col';

  // Sender name (theirs, not grouped)
  if (!isMe && !grouped) {
    const nameEl = document.createElement('div');
    nameEl.className = 'sender-name';
    nameEl.textContent = data.username;
    col.appendChild(nameEl);
  }

  // Reply quote
  if (data.reply_to) {
    // We'll just show a placeholder; ideally we'd look up the content
    const rq = document.createElement('div');
    rq.className = 'reply-quote';
    rq.innerHTML = `<div class="rq-user">↩ Reply</div><div class="rq-text">${data.reply_to}</div>`;
    rq.onclick = () => {
      const orig = document.getElementById(`row-${data.reply_to}`);
      if (orig) orig.scrollIntoView({ behavior:'smooth', block:'center' });
    };
    col.appendChild(rq);
  }

  // Bubble wrapper for positioning context menu
  const bWrap = document.createElement('div');
  bWrap.style.cssText = 'position:relative;display:flex;flex-direction:column';
  if (isMe) bWrap.style.alignItems = 'flex-end';

  // Bubble
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Content
  const contentWrap = document.createElement('div');
  contentWrap.className = 'bubble-content';

  let rawText = '';
  if (data.type === 'chat') {
    rawText = data.message || '';
    const textEl = document.createElement('span');
    textEl.id = `content-${mid}`;
    textEl.textContent = rawText;
    contentWrap.appendChild(textEl);
    if (data.edited) {
      const ed = document.createElement('span');
      ed.className = 'edited-label'; ed.textContent = ' (edited)';
      contentWrap.appendChild(ed);
    }
  } else if (data.type === 'image') {
    const img = document.createElement('img');
    img.src = data.url;
    img.onclick = () => { document.getElementById('img-preview-el').src = data.url; document.getElementById('img-modal').style.display=''; };
    contentWrap.appendChild(img);
  } else if (data.type === 'voice') {
    contentWrap.innerHTML = `
      <div class="voice-player" onclick="playVoice(this,'${data.url}')">
        <i class="fa-solid fa-circle-play voice-icon"></i>
        <div class="voice-info">Voice Message<br><small>Tap to play</small></div>
      </div>`;
  }
  bubble.appendChild(contentWrap);

  // Meta row (time + ticks)
  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  const timeEl = document.createElement('span');
  timeEl.className = 'msg-time'; timeEl.textContent = fmtTime(ts);
  meta.appendChild(timeEl);
  if (isMe) {
    const tick = document.createElement('span');
    tick.id = `tick-${mid}`;
    tick.className = 'tick'; tick.textContent = '✓';
    meta.appendChild(tick);
  }
  bubble.appendChild(meta);

  // 3-dot button
  const dotsBtn = document.createElement('button');
  dotsBtn.className = 'dots-btn';
  dotsBtn.innerHTML = '<i class="fa-solid fa-ellipsis-vertical"></i>';
  dotsBtn.onclick = (e) => { e.stopPropagation(); toggleCtx(mid); };
  bubble.appendChild(dotsBtn);

  // Context menu
  const ctxMenu = document.createElement('div');
  ctxMenu.className = 'ctx-menu';
  ctxMenu.id = `ctx-${mid}`;

  const menuItems = [
    { icon:'fa-reply',     label:'Reply',       fn:`startReply('${mid}','${data.username.replace(/'/g,"\\'")}','${(rawText||'media').replace(/'/g,"\\'").slice(0,60)}')` },
    ...(isMe && data.type==='chat' ? [{ icon:'fa-pen', label:'Edit', fn:`startEdit('${mid}')` }] : []),
    { icon:'fa-copy',      label:'Copy text',   fn:`copyMsg('${mid}')` },
    { icon:'fa-share',     label:'Forward',     fn:`openFwd('${mid}','${(rawText||'media').replace(/'/g,"\\'").slice(0,200)}')` },
    { icon:'fa-thumbtack', label:'Pin message', fn:`pinMsg('${mid}','${(rawText||'[media]').replace(/'/g,"\\'").slice(0,80)}')` },
    { icon:'fa-trash',     label:'Delete for me', fn:`document.getElementById('row-${mid}')?.remove()`, danger:false },
    ...(isMe ? [{ icon:'fa-trash', label:'Delete for all', fn:`delForAll('${mid}')`, danger:true }] : [])
  ];

  menuItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'ctx-item' + (item.danger ? ' danger' : '');
    div.innerHTML = `<i class="fa-solid ${item.icon}"></i> ${item.label}`;
    div.onclick = (e) => { e.stopPropagation(); eval(item.fn); closeAllCtx(); };
    ctxMenu.appendChild(div);
  });

  // React picker trigger
  const reactTrigger = document.createElement('div');
  reactTrigger.className = 'ctx-item';
  reactTrigger.innerHTML = `<i class="fa-solid fa-face-smile"></i> React`;
  reactTrigger.onclick = (e) => { e.stopPropagation(); closeAllCtx(); showReactPicker(bWrap, mid); };
  ctxMenu.insertBefore(reactTrigger, ctxMenu.children[0]);

  bubble.appendChild(ctxMenu);
  bWrap.appendChild(bubble);

  // Reactions row
  const reactRow = document.createElement('div');
  reactRow.className = 'reactions-row';
  reactRow.id = `react-${mid}`;
  if (data.reactions && Object.keys(data.reactions).length > 0) {
    renderReactPills(reactRow, mid, data.reactions);
  }
  bWrap.appendChild(reactRow);

  col.appendChild(bWrap);
  row.appendChild(col);
  box.appendChild(row);

  if (!isHistory) autoScroll();
}

function autoScroll() {
  const box = document.getElementById('chat-box');
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 160;
  if (atBottom) scrollToBottom();
}

function scrollToBottom(instant=false) {
  const box = document.getElementById('chat-box');
  if (instant) box.scrollTop = box.scrollHeight;
  else box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
  // Hide scroll button + reset badge
  const btn = document.getElementById('scroll-btn');
  btn.classList.remove('visible');
  const badge = document.getElementById('scroll-unread');
  badge.style.display = 'none'; badge.textContent = '';
}

// Scroll button visibility
document.addEventListener('DOMContentLoaded', () => {
  const box = document.getElementById('chat-box');
  if (box) box.addEventListener('scroll', () => {
    const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 120;
    const btn = document.getElementById('scroll-btn');
    if (atBottom) { btn.classList.remove('visible'); }
    else { btn.classList.add('visible'); }
  });
});

// ═══════════════════════════════════════════════════════════════════════════
// REACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function renderReactPills(container, mid, reactions) {
  container.innerHTML = '';
  for (const [emoji, cnt] of Object.entries(reactions)) {
    const pill = document.createElement('button');
    pill.className = 'react-pill';
    pill.innerHTML = `${emoji} <span>${cnt}</span>`;
    pill.onclick = () => sendReact(mid, emoji);
    container.appendChild(pill);
  }
}

function showReactPicker(parentEl, mid) {
  document.querySelectorAll('.react-picker').forEach(p => p.remove());
  const picker = document.createElement('div');
  picker.className = 'react-picker';
  REACT_EMOJIS.forEach(emoji => {
    const btn = document.createElement('span');
    btn.textContent = emoji;
    btn.onclick = (e) => { e.stopPropagation(); sendReact(mid, emoji); picker.remove(); };
    picker.appendChild(btn);
  });
  parentEl.appendChild(picker);
  setTimeout(() => document.addEventListener('click', () => picker.remove(), { once:true }), 0);
}

function sendReact(mid, emoji) {
  if (socket?.readyState === WebSocket.OPEN)
    socket.send(JSON.stringify({ type:'react_msg', msgId:mid, emoji }));
}

// ═══════════════════════════════════════════════════════════════════════════
// MESSAGE ACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function toggleCtx(mid) {
  const menu = document.getElementById(`ctx-${mid}`);
  const wasActive = menu.classList.contains('active');
  closeAllCtx();
  if (!wasActive) menu.classList.add('active');
}
function closeAllCtx() {
  document.querySelectorAll('.ctx-menu.active').forEach(m => m.classList.remove('active'));
}

function delForAll(mid) {
  socket.send(JSON.stringify({ type:'delete_msg', msgId:mid }));
}

function startReply(mid, sender, content) {
  replyTo = { msgId:mid, username:sender, content };
  document.getElementById('rp-user').textContent = sender;
  document.getElementById('rp-text').textContent = content;
  document.getElementById('reply-preview').classList.add('active');
  document.getElementById('msg-input').focus();
}
function cancelReply() {
  replyTo = null;
  document.getElementById('reply-preview').classList.remove('active');
}

function startEdit(mid) {
  const contentEl = document.querySelector(`#content-${mid}`);
  if (!contentEl) return;
  editingMsgId = mid;
  const input = document.getElementById('msg-input');
  input.value = contentEl.textContent;
  input.focus();
  document.getElementById('act-icon').className = 'fa-solid fa-check';
  toast('Editing message — press Enter to save');
}

function copyMsg(mid) {
  const contentEl = document.querySelector(`#content-${mid}`);
  const text = contentEl?.textContent || '';
  navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    toast('Copied!');
  });
}

function openFwd(mid, content) {
  fwdContent = content;
  const listEl = document.getElementById('fwd-rooms-list');
  listEl.innerHTML = '';
  const targets = [...PRESET_ROOMS, ...dmRooms].filter(r => r !== room);
  targets.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'fwd-room-btn';
    btn.textContent = '#' + r;
    btn.onclick = () => { doForward(r); closeFwd(); };
    listEl.appendChild(btn);
  });
  document.getElementById('fwd-modal').style.display = '';
}
function closeFwd() { document.getElementById('fwd-modal').style.display = 'none'; }
async function doForward(targetRoom) {
  await fetch('/api/forward', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username:user, room:targetRoom, message:fwdContent })
  });
  toast(`Forwarded to #${targetRoom}`);
}

function pinMsg(mid, content) {
  socket.send(JSON.stringify({ type:'pin_msg', msgId:mid, content }));
}
function sendUnpin() {
  socket.send(JSON.stringify({ type:'unpin_msg' }));
}
function updatePinBanner(pinned) {
  const banner = document.getElementById('pin-banner');
  const pinText = document.getElementById('pin-text');
  if (pinned) {
    pinText.textContent = `📌 ${pinned.content}`;
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// VOICE
// ═══════════════════════════════════════════════════════════════════════════
function playVoice(btn, url) {
  const icon = btn.querySelector('.voice-icon');
  if (activeAudio && !activeAudio.paused) {
    activeAudio.pause();
    document.querySelectorAll('.voice-icon').forEach(i => i.className='fa-solid fa-circle-play voice-icon');
    return;
  }
  if (activeAudio) activeAudio.pause();
  activeAudio = new Audio(url);
  icon.className = 'fa-solid fa-circle-pause voice-icon';
  activeAudio.play();
  activeAudio.onended = () => { icon.className = 'fa-solid fa-circle-play voice-icon'; activeAudio = null; };
}

async function startVoice() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio:true });
    recorder = new MediaRecorder(s, { mimeType:'audio/webm' });
    chunks = [];
    recorder.ondataavailable = e => { if (e.data.size>0) chunks.push(e.data); };
    recorder.onstop = () => {
      if (chunks.length > 0) {
        const blob = new Blob(chunks, { type:'audio/webm' });
        if (blob.size > 5_242_880) { toast('Voice message too large (max 5MB)', true); return; }
        const fr = new FileReader();
        fr.onload = () => {
          const mid = `m-${Date.now()}`;
          socket.send(JSON.stringify({ type:'voice', url:fr.result, msgId:mid }));
        };
        fr.readAsDataURL(blob);
      }
      chunks = [];
    };
    recorder.start();
    document.getElementById('input-pill').style.display = 'none';
    document.getElementById('rec-ui').style.display     = 'flex';
  } catch(e) { toast('Microphone access denied.', true); }
}
function stopVoice()   { recorder?.stop(); resetToolbar(); }
function cancelVoice() { chunks=[]; recorder?.stop(); resetToolbar(); }
function resetToolbar() {
  document.getElementById('input-pill').style.display = '';
  document.getElementById('rec-ui').style.display     = 'none';
}

// ═══════════════════════════════════════════════════════════════════════════
// IMAGE PREVIEW
// ═══════════════════════════════════════════════════════════════════════════
function previewImg() {
  const f = document.getElementById('file-in').files[0];
  if (!f) return;
  if (f.size > 5_242_880) { toast('Image too large (max 5MB)', true); return; }
  const fr = new FileReader();
  fr.onload = () => {
    pendingImgData = fr.result;
    document.getElementById('img-preview-el').src = pendingImgData;
    document.getElementById('img-modal').style.display = '';
  };
  fr.readAsDataURL(f);
  document.getElementById('file-in').value = '';
}
function confirmSendImg() {
  if (!pendingImgData || !socket) return;
  const mid = `m-${Date.now()}`;
  socket.send(JSON.stringify({ type:'image', url:pendingImgData, msgId:mid }));
  pendingImgData = null;
  document.getElementById('img-modal').style.display = 'none';
}
function cancelImg() {
  pendingImgData = null;
  document.getElementById('img-modal').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════════════════
// SEND + TYPING
// ═══════════════════════════════════════════════════════════════════════════
function handleAction() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text && !editingMsgId) { startVoice(); return; }
  if (!socket || socket.readyState !== WebSocket.OPEN) { toast('Not connected', true); return; }

  if (editingMsgId) {
    // Save edit
    socket.send(JSON.stringify({ type:'edit_msg', msgId:editingMsgId, message:text }));
    editingMsgId = null;
    input.value  = '';
    document.getElementById('act-icon').className = 'fa-solid fa-microphone';
    return;
  }

  // Normal send
  const mid = `m-${Date.now()}`;
  socket.send(JSON.stringify({
    type: 'chat', message: text, msgId: mid,
    reply_to: replyTo ? replyTo.msgId : null,
  }));
  input.value = ''; handleTyping(); cancelReply();
}

function handleTyping() {
  const v = document.getElementById('msg-input').value;
  if (!editingMsgId)
    document.getElementById('act-icon').className = v.trim() ? 'fa-solid fa-paper-plane' : 'fa-solid fa-microphone';
  if (!socket || socket.readyState !== WebSocket.OPEN) return;
  socket.send(JSON.stringify({ type:'typing' }));
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => socket.send(JSON.stringify({ type:'stop_typing' })), 2000);
}

// ═══════════════════════════════════════════════════════════════════════════
// EMOJI
// ═══════════════════════════════════════════════════════════════════════════
function toggleEmoji() {
  const d = document.getElementById('emoji-drawer');
  d.classList.toggle('open');
}
function addEj(e) {
  const input = document.getElementById('msg-input');
  input.value += e; input.focus(); handleTyping();
}

// ═══════════════════════════════════════════════════════════════════════════
// ONLINE USERS
// ═══════════════════════════════════════════════════════════════════════════
function renderUsersList(users) {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  users.forEach(uname => {
    const el = document.createElement('div');
    el.className = 'user-entry';
    const avEl = makeAv(uname, 32, 13);
    const info = document.createElement('div');
    info.innerHTML = `<div class="uname">${uname}</div><div class="u-online">Online</div>`;
    el.appendChild(avEl); el.appendChild(info);
    // Click to DM
    if (uname !== user) {
      el.onclick = () => openDm(uname);
      el.title   = `Message ${uname}`;
      el.style.cursor = 'pointer';
    }
    list.appendChild(el);
  });
}

function openDm(other) {
  const parts = [user, other].sort();
  const dmRoom = `dm_${parts[0]}_${parts[1]}`;
  if (!dmRooms.includes(dmRoom)) { dmRooms.push(dmRoom); buildDmList(); }
  switchRoom(dmRoom);
}

// ═══════════════════════════════════════════════════════════════════════════
// ROOM SWITCHING
// ═══════════════════════════════════════════════════════════════════════════
function switchRoom(newRoom) {
  if (newRoom === room) return;
  room = newRoom;
  clearChat();
  if (socket) { socket.onclose = null; socket.close(); }
  document.getElementById('pin-banner').style.display = 'none';
  document.getElementById('typing-indicator').textContent = '';
  cancelReply(); if (editingMsgId) { editingMsgId = null; document.getElementById('act-icon').className = 'fa-solid fa-microphone'; document.getElementById('msg-input').value=''; }
  reconnectAttempts = 0;
  connectWS();
}

// ═══════════════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════════════
function toggleSearch() {
  const bar = document.getElementById('search-bar');
  if (bar.classList.toggle('active')) {
    document.getElementById('search-input').focus();
  } else {
    closeSearch();
  }
}
function closeSearch() {
  document.getElementById('search-bar').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.search-dim,.search-hi').forEach(el => {
    el.classList.remove('search-dim','search-hi');
  });
  searchMatches = []; searchIdx = 0;
  document.getElementById('search-count').textContent = '';
}
function runSearch() {
  const term = document.getElementById('search-input').value.trim().toLowerCase();
  searchMatches = []; searchIdx = 0;
  document.querySelectorAll('.msg-row').forEach(row => {
    row.classList.remove('search-dim','search-hi');
    if (!term) return;
    const txt = row.textContent.toLowerCase();
    if (txt.includes(term)) { row.classList.add('search-hi'); searchMatches.push(row); }
    else row.classList.add('search-dim');
  });
  if (!term) { document.getElementById('search-count').textContent=''; return; }
  document.getElementById('search-count').textContent = `${searchMatches.length} result${searchMatches.length!==1?'s':''}`;
  if (searchMatches.length) searchMatches[0].scrollIntoView({ behavior:'smooth', block:'center' });
}
function searchNav(e) {
  if (!searchMatches.length) return;
  if (e.key === 'Enter' || e.key === 'ArrowDown') {
    e.preventDefault();
    searchIdx = (searchIdx+1) % searchMatches.length;
    searchMatches[searchIdx].scrollIntoView({ behavior:'smooth', block:'center' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchIdx = (searchIdx-1+searchMatches.length) % searchMatches.length;
    searchMatches[searchIdx].scrollIntoView({ behavior:'smooth', block:'center' });
  } else if (e.key === 'Escape') { closeSearch(); }
}

// THEME
// ═══════════════════════════════════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  localStorage.setItem('cb-theme', html.dataset.theme);
}
// Restore saved theme
(function() {
  const saved = localStorage.getItem('cb-theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    // will fix icon after DOM loads
  }
})();

  closeAllCtx();
  document.querySelectorAll('.react-picker').forEach(p => p.remove());
});

// Fix theme icon on load
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('cb-theme');
  if (saved === 'light') document.getElementById('theme-icon').className = 'fa-solid fa-sun';

  // Scroll btn observer
  const box = document.getElementById('chat-box');
  box.addEventListener('scroll', () => {
    const btn = document.getElementById('scroll-btn');
    const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 120;
    btn.classList.toggle('visible', !atBottom);
  });
});

// Listen for 'Enter' on the Login Page inputs
document.addEventListener('DOMContentLoaded', () => {
  const loginIds = ['L-user', 'L-pass', 'L-custom'];
  
  loginIds.forEach(id => {
    const inputElement = document.getElementById(id);
    if (inputElement) {
      inputElement.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault(); // Prevents the default browser behavior
          doJoin();           // Clicks the "Enter Chat" button for you
        }
      });
    }
  });
});
